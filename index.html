    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "AI 관상은 어떤 방식으로 측정되나요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Facetiny는 Google의 실시간 안면 인식 머신러닝 엔진(MediaPipe Face Landmarker)을 활용하여 사용자의 얼굴에서 468개의 3D 좌표를 실시간으로 계측합니다. 이를 통해 이마, 코, 턱, 광대의 기하학적 비대칭도 및 깊이(Z값)를 계측하고, 미간과 코끝 픽셀의 평균 HSL 조도와 밝기(기색)를 분석해 오행체질과 4대 운세 텍스트와 매칭합니다."
          }
        },
        {
          "@type": "Question",
          "name": "분석을 위한 얼굴 사진은 안전하게 보호되나요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "예, 100% 안전합니다. Facetiny는 사용자의 비디오 프레임이나 업로드된 사진 파일을 외부 서버로 단 1바이트도 전송하지 않습니다. 모든 AI 인식 연산은 사용자의 웹 브라우저 내부(클라이언트사이드)에서 WebAssembly 컴파일 기술로 구동되어 완전히 로컬에서 종결되며, 탭을 닫거나 분석이 끝나면 즉시 메모리에서 영구히 삭제됩니다."
          }
        },
        {
          "@type": "Question",
          "name": "오행체질과 삼정비율의 전통학적 근거는 무엇인가요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "본 서비스는 전통 동양 상학의 핵심 경전인 《마의상법(麻衣相法)》, 《오행상설(五행學說)》, 《삼정상법(三停相法)》 등에 기술된 얼굴형 분류 및 대칭 구조 이론을 기반으로 설계되었습니다. 과거 선현들이 누적한 인상학적 지표들을 정량 수치로 환산하여 매칭을 제공합니다."
          }
        },
        {
          "@type": "Question",
          "name": "관상 진단 결과를 전적으로 신뢰해야 하나요?",

            "text": "아닙니다. 전통 관상학 및 인상론은 오랜 역사 동안 통계적 관찰로 축적된 지혜이나 과학적 근거를 담보하지 않습니다. 본 서비스의 결과 카드는 인생에 긍정적인 마음가짐을 가지고 건강한 생활 습관을 유지하도록 조언해 드리는 재미 및 조언 용도(Entertainment)로만 받아들이시기 바랍니다."
          }
        }
      ]
